<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 210" role="img" aria-label="Herschel Supply Co.">
  <title>Herschel Supply Co.</title>
  <defs>
    <path id="topArc"    d="M 30,115 A 90,90 0 0,1 210,115"/>
    <path id="bottomArc" d="M 48,148 A 76,76 0 0,0 192,148"/>
  </defs>

  <!-- outer oval border -->
  <ellipse cx="120" cy="108" rx="112" ry="100" fill="none" stroke="#0d0d0d" stroke-width="2.2"/>
  <!-- inner oval border -->
  <ellipse cx="120" cy="108" rx="104" ry="92"  fill="none" stroke="#0d0d0d" stroke-width="0.8"/>

  <!-- "THE FINEST QUALITY" curved along top arc -->
  <text font-family="Georgia,'Times New Roman',serif" font-size="11.5" font-weight="700" letter-spacing="0.18em" fill="#0d0d0d">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">THE FINEST QUALITY</textPath>
  </text>

  <!-- "THE" -->
  <text x="120" y="52" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="13" letter-spacing="0.1em" fill="#0d0d0d">THE</text>

  <!-- "Herschel" — large italic script -->
  <text x="120" y="118" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="58" font-style="italic" font-weight="700"
        letter-spacing="-0.02em" fill="#0d0d0d">Herschel</text>

  <!-- "SUPPLY CO. BRAND" -->
  <text x="120" y="138" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="10.5" font-weight="700" letter-spacing="0.14em" fill="#0d0d0d">SUPPLY CO. BRAND</text>

  <!-- decorative rule + flourish -->
  <line x1="52" y1="149" x2="168" y2="149" stroke="#0d0d0d" stroke-width="0.9"/>
  <text x="120" y="160" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="13" fill="#0d0d0d">&#x2767;</text>
  <line x1="52" y1="165" x2="168" y2="165" stroke="#0d0d0d" stroke-width="0.9"/>

  <!-- "TRADE MARK" curved along bottom arc -->
  <text font-family="Georgia,'Times New Roman',serif" font-size="11" font-weight="700" letter-spacing="0.22em" fill="#0d0d0d">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">TRADE MARK</textPath>
  </text>
</svg>
